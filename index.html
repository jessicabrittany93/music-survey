<!DOCTYPE HTML>
       <!DOCTYPE html>
<html lang="en">
<head> <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Music Survey</title>

  <style>
    body {
      background-color: #F5F5F5;
      color: #40407A;
      font-family: Verdana, Arial, sans-serif;
    }

    header {
      background-color: #80CBC4;
      text-align: center;
      padding: 15px;
    }

    nav {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
    }

    nav a {
      text-decoration: none;
      margin: 0 10px;
      color: #40407A;
    }

    .studio {
      font-style: italic;
      text-align: center;
    }

    main {
      width: 60%;
      margin: auto;
      background-color: #FFFFFF;
      padding: 20px;
      border-radius: 8px;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-top: 10px;
    }

    input, textarea, select {
      margin-top: 5px;
      padding: 5px;
      font-size: 1em;
    }

    fieldset {
      margin-top: 15px;
      padding: 10px;
      border: 2px solid #80CBC4;
    }

    legend {
      font-weight: bold;
    }

    input[type="submit"],
    input[type="reset"] {
      margin-top: 15px;
      width: 120px;
      align-self: flex-start;
      background-color: #80CBC4;
      border: none;
      cursor: pointer;
    }

    footer {
      background-color: #80CBC4;
      font-size: 0.60em;
      font-style: italic;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Music Survey</h1>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Survey</a>
  <a href="#">Contact</a>
</nav>

<main>
  <h2 class="studio">Tell Us About Your Music Preferences</h2>

  <form action="#" method="post">

    <label for="name">Name:</label>
    <input type="text" id="name" name="name">

    <label for="email">E-mail Address:</label>
    <input type="email" id="email" name="email">

    <fieldset>
      <legend>Favorite Music Genre</legend>

      <input type="radio" id="rock" name="genre">
      <label for="rock">Rock</label><br>

      <input type="radio" id="pop" name="genre">
      <label for="pop">Pop</label><br>

      <input type="radio" id="jazz" name="genre">
      <label for="jazz">Jazz</label>
    </fieldset>

    <fieldset>
      <legend>How Do You Listen to Music?</legend>

      <input type="checkbox" id="streaming" name="listen">
      <label for="streaming">Streaming</label><br>

      <input type="checkbox" id="radio" name="listen">
      <label for="radio">Radio</label><br>

      <input type="checkbox" id="concerts" name="listen">
      <label for="concerts">Live Concerts</label>
    </fieldset>

    <label for="artist">Favorite Artist:</label>
    <select id="artist" name="artist" size="3">
      <option>Taylor Swift</option>
      <option>Drake</option>
      <option>Beyoncé</option>
      <option>Other</option>
    </select>

    <label for="comments">Comments:</label>
    <textarea id="comments" name="comments" cols="60" rows="3"></textarea>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

  </form>
</main>

<footer>
  Jessica Page | jessicabrittany93@gmail.com
</footer>

</body>
</html>
  &copy; 2026 Music Survey
</footer>

</body>
</html>
</form>
